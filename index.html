<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Search Engine - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #a855f7; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-2xl w-full">
        <h1 class="text-6xl font-extrabold mb-4 bg-gradient-to-r from-purple-400 via-pink-500 to-blue-500 bg-clip-text text-transparent">
            Web3 Search
        </h1>
        <p class="text-slate-400 mb-10 text-lg">Baar oo fur Unstoppable Domains (Web3) si toos ah.</p>

        <div class="glass p-8 rounded-3xl shadow-2xl border border-white/10">
            <div class="relative flex items-center">
                <input type="text" id="domainInput" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-5 px-6 text-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-white placeholder-slate-500" 
                    placeholder="Tusaale: maxaas.u ama google.x">
                <button onclick="resolveWeb3()" 
                    class="absolute right-3 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg active:scale-95">
                    Search
                </button>
            </div>

            <div id="status" class="mt-8 min-h-[50px] flex flex-col items-center justify-center space-y-4">
                <!-- Status and Results -->
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-12">
            <div class="glass p-5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all">
                <h3 class="text-purple-400 font-bold mb-2 text-sm uppercase tracking-widest">Fududeyn</h3>
                <p class="text-slate-400 text-sm">Looma baahna Brave ama Extension. Wax walba halkan ka fur.</p>
            </div>
            <div class="glass p-5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all">
                <h3 class="text-blue-400 font-bold mb-2 text-sm uppercase tracking-widest">Tiknoolajiyada</h3>
                <p class="text-slate-400 text-sm">Waxaa ku dhex dhisan Alchemy API oo baaraya Ethereum & Polygon.</p>
            </div>
        </div>
    </div>

    <script>
        async function resolveWeb3() {
            const domain = document.getElementById('domainInput').value.trim().toLowerCase();
            const statusDiv = document.getElementById('status');
            const apiKey = "5c7a6CNiQGzD8KfLluGRN";
            
            if (!domain || !domain.includes('.')) {
                updateStatus("Fadlan qor domain sax ah (tusaale: .u, .crypto, .x)", "text-yellow-400");
                return;
            }

            updateStatus(`<div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8 mb-2"></div> Baaritaan Blockchain...`, "text-blue-400");

            const networks = [
                `https://polygon-mainnet.g.alchemy.com/v2/${apiKey}`,
                `https://eth-mainnet.g.alchemy.com/v2/${apiKey}`
            ];

            let resolvedAddress = null;

            try {
                for (let url of networks) {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: "2.0", id: 1,
                            method: "alchemy_resolveName",
                            params: [domain]
                        })
                    });
                    const data = await response.json();
                    if (data.result && data.result !== "0x0000000000000000000000000000000000000000") {
                        resolvedAddress = data.result;
                        break;
                    }
                }

                if (resolvedAddress) {
                    updateStatus(`
                        <span class="text-green-400 font-bold text-lg">Waa la helay!</span><br>
                        <span class="text-slate-400 text-xs">Wallet: ${resolvedAddress}</span><br>
                        <p class="mt-2 text-white animate-bounce">Laguu wareejinayaa...</p>
                    `, "text-white");
                    setTimeout(() => window.location.href = `https://${domain}.limo`, 2000);
                } else {
                    updateStatus(`
                        <p class="text-red-400">Blockchain-ka laguma helin xogta domain-kan.</p>
                        <button onclick="window.location.href='https://${domain}.limo'" class="mt-4 text-purple-400 underline font-bold hover:text-purple-300">
                            Force Open (Isku day inaad si toos ah u furto)
                        </button>
                    `, "");
                }
            } catch (err) {
                updateStatus("Khalad dhanka xiriirka ah. Hubi internet-kaaga.", "text-red-500");
            }
        }

        function updateStatus(html, colorClass) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = html;
            statusDiv.className = `mt-8 min-h-[50px] flex flex-col items-center justify-center space-y-2 transition-all ${colorClass}`;
        }
    </script>
</body>
</html>
